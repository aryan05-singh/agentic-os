<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>agentic-os</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #262d37;
    --text: #e6edf3; --dim: #8b949e; --accent: #58a6ff; --accent2: #3fb950;
    --user-bubble: #1f2937; --danger: #f85149;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font: 15px/1.55 system-ui, -apple-system, "Segoe UI", sans-serif;
    height: 100vh; display: flex; flex-direction: column;
  }
  header {
    display: flex; align-items: baseline; gap: 12px;
    padding: 14px 22px; border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 18px; font-weight: 650; }
  header h1::before { content: "⚡ "; }
  header .model { color: var(--dim); font-size: 13px; }
  main { flex: 1; display: flex; min-height: 0; }

  /* chat column */
  #chat { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #messages { flex: 1; overflow-y: auto; padding: 22px; display: flex; flex-direction: column; gap: 14px; }
  .msg { max-width: 76%; padding: 10px 14px; border-radius: 12px; white-space: pre-wrap; word-wrap: break-word; }
  .msg.user { align-self: flex-end; background: var(--user-bubble); border: 1px solid var(--border); }
  .msg.agent { align-self: flex-start; background: var(--panel); border: 1px solid var(--border); }
  .msg.agent.streaming::after { content: "▋"; color: var(--accent); animation: blink 1s step-end infinite; }
  .msg.error { align-self: center; color: var(--danger); background: none; font-size: 13px; }
  @keyframes blink { 50% { opacity: 0; } }
  #composer { display: flex; gap: 10px; padding: 14px 22px; border-top: 1px solid var(--border); }
  #input {
    flex: 1; background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px;
    font: inherit; outline: none; resize: none;
  }
  #input:focus { border-color: var(--accent); }
  #send {
    background: var(--accent); color: #0d1117; border: 0; border-radius: 10px;
    padding: 0 20px; font: inherit; font-weight: 650; cursor: pointer;
  }
  #send:disabled { opacity: .4; cursor: default; }

  /* sidebar */
  aside {
    width: 320px; border-left: 1px solid var(--border);
    overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 22px;
  }
  aside h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .08em; color: var(--dim); margin-bottom: 10px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; }
  .card .topic { color: var(--accent); font-size: 12px; font-weight: 650; }
  .card .body { font-size: 13px; }
  .card .when { color: var(--dim); font-size: 11px; margin-top: 4px; }
  .task { display: flex; justify-content: space-between; align-items: center; }
  .task .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--border); color: var(--dim); }
  .task .badge.due { color: var(--accent2); border-color: var(--accent2); }
  .empty { color: var(--dim); font-size: 13px; }

  /* approval modal */
  #overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.6);
    display: none; align-items: center; justify-content: center;
  }
  #overlay.show { display: flex; }
  #dialog {
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    padding: 24px; width: min(560px, 90vw);
  }
  #dialog h3 { font-size: 15px; margin-bottom: 12px; }
  #dialog code {
    display: block; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px; font-size: 13px; margin-bottom: 18px;
    white-space: pre-wrap; word-break: break-all;
  }
  #dialog .buttons { display: flex; gap: 10px; justify-content: flex-end; }
  #dialog button { padding: 8px 18px; border-radius: 8px; border: 1px solid var(--border); font: inherit; cursor: pointer; }
  #deny { background: none; color: var(--text); }
  #allow { background: var(--accent2); color: #0d1117; border: 0; font-weight: 650; }

  @media (max-width: 760px) { aside { display: none; } }

  /* voice */
  header .spacer { flex: 1; }
  .icon-btn {
    background: var(--panel); color: var(--dim); border: 1px solid var(--border);
    border-radius: 10px; padding: 0 14px; font: inherit; font-size: 17px; cursor: pointer;
  }
  .icon-btn.on { color: var(--accent); border-color: var(--accent); }
  #mic.listening { color: var(--danger); border-color: var(--danger); animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 50% { transform: scale(1.12); } }

  /* memory galaxy */
  .section-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .section-head h2 { margin-bottom: 0; }
  .section-head a { color: var(--accent); font-size: 12px; cursor: pointer; text-decoration: none; }
  #galaxy-overlay {
    position: fixed; inset: 0; background: rgba(8,11,16,.96);
    display: none; flex-direction: column;
  }
  #galaxy-overlay.show { display: flex; }
  #galaxy-overlay .bar { display: flex; justify-content: space-between; padding: 14px 22px; color: var(--dim); }
  #galaxy-overlay .bar b { color: var(--text); }
  #galaxy-overlay .bar span { cursor: pointer; }
  #galaxy { flex: 1; width: 100%; }
</style>
</head>
<body>
<header>
  <h1 id="agent-name">agentic-os</h1>
  <span class="model" id="agent-model"></span>
  <span class="spacer"></span>
  <button id="voice-toggle" class="icon-btn" type="button" title="Speak replies aloud">🔊</button>
</header>
<main>
  <section id="chat">
    <div id="messages"></div>
    <form id="composer">
      <textarea id="input" rows="1" placeholder="Message your agent… (Enter to send)"></textarea>
      <button id="mic" class="icon-btn" type="button" title="Talk to your agent">🎤</button>
      <button id="send" type="submit">Send</button>
    </form>
  </section>
  <aside>
    <div>
      <div class="section-head">
        <h2>Memories</h2>
        <a id="galaxy-btn">galaxy ✦</a>
      </div>
      <div id="memories"><div class="empty">nothing stored yet</div></div>
    </div>
    <div>
      <h2>Scheduled tasks</h2>
      <div id="tasks"><div class="empty">no tasks configured</div></div>
    </div>
  </aside>
</main>

<div id="galaxy-overlay">
  <div class="bar"><b>memory galaxy</b><span id="galaxy-close">✕ close</span></div>
  <canvas id="galaxy"></canvas>
</div>

<div id="overlay">
  <div id="dialog">
    <h3>The agent wants to run a shell command</h3>
    <code id="command"></code>
    <div class="buttons">
      <button id="deny" type="button">Deny</button>
      <button id="allow" type="button">Allow</button>
    </div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const messages = $("messages");

function addMessage(cls, text) {
  const el = document.createElement("div");
  el.className = "msg " + cls;
  el.textContent = text;
  messages.appendChild(el);
  messages.scrollTop = messages.scrollHeight;
  return el;
}

function timeAgo(ts) {
  const s = Math.floor(Date.now() / 1000 - ts);
  if (s < 60) return "just now";
  if (s < 3600) return Math.floor(s / 60) + "m ago";
  if (s < 86400) return Math.floor(s / 3600) + "h ago";
  return Math.floor(s / 86400) + "d ago";
}

async function loadState() {
  try {
    const state = await (await fetch("/api/state")).json();
    lastMemories = state.memories;
    $("agent-name").textContent = state.name;
    $("agent-model").textContent = state.model;
    document.title = state.name + " — agentic-os";

    const mem = $("memories");
    mem.innerHTML = "";
    if (!state.memories.length) mem.innerHTML = '<div class="empty">nothing stored yet</div>';
    for (const m of state.memories) {
      const card = document.createElement("div");
      card.className = "card";
      const topic = document.createElement("div"); topic.className = "topic"; topic.textContent = m.topic;
      const body = document.createElement("div"); body.className = "body"; body.textContent = m.content;
      const when = document.createElement("div"); when.className = "when"; when.textContent = timeAgo(m.created_at);
      card.append(topic, body, when);
      mem.appendChild(card);
    }

    const tasks = $("tasks");
    tasks.innerHTML = "";
    if (!state.tasks.length) tasks.innerHTML = '<div class="empty">no tasks configured</div>';
    for (const t of state.tasks) {
      const card = document.createElement("div");
      card.className = "card task";
      const label = document.createElement("div");
      label.innerHTML = "<div class='body'></div><div class='when'></div>";
      label.querySelector(".body").textContent = t.name;
      label.querySelector(".when").textContent =
        t.every + (t.last_run ? " · ran " + timeAgo(t.last_run) : " · never run");
      const badge = document.createElement("span");
      badge.className = "badge" + (t.due ? " due" : "");
      badge.textContent = t.due ? "due" : "ok";
      card.append(label, badge);
      tasks.appendChild(card);
    }
  } catch { /* server briefly busy; next poll wins */ }
}

function showApproval(command) {
  $("command").textContent = command;
  $("overlay").classList.add("show");
}
async function answerApproval(allow) {
  $("overlay").classList.remove("show");
  await fetch("/api/approve", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ allow }),
  });
}
$("allow").onclick = () => answerApproval(true);
$("deny").onclick = () => answerApproval(false);

async function send(text) {
  addMessage("user", text);
  const agentEl = addMessage("agent streaming", "");
  $("send").disabled = true;

  try {
    const resp = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text }),
    });
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      let idx;
      while ((idx = buffer.indexOf("\n\n")) >= 0) {
        const chunk = buffer.slice(0, idx);
        buffer = buffer.slice(idx + 2);
        if (!chunk.startsWith("data: ")) continue;
        const event = JSON.parse(chunk.slice(6));
        if (event.type === "token") {
          agentEl.textContent += event.text;
          messages.scrollTop = messages.scrollHeight;
        } else if (event.type === "approval") {
          showApproval(event.command);
        } else if (event.type === "error") {
          addMessage("error", event.text);
        }
      }
    }
  } catch (e) {
    addMessage("error", "connection lost: " + e.message);
  } finally {
    agentEl.classList.remove("streaming");
    if (!agentEl.textContent) agentEl.remove();
    else speak(agentEl.textContent);
    $("send").disabled = false;
    $("input").focus();
    loadState();
  }
}

$("composer").onsubmit = (e) => {
  e.preventDefault();
  const text = $("input").value.trim();
  if (!text || $("send").disabled) return;
  $("input").value = "";
  send(text);
};
$("input").onkeydown = (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    $("composer").requestSubmit();
  }
};

// ---- voice: speak replies aloud ----
let voiceOn = false;
$("voice-toggle").onclick = () => {
  voiceOn = !voiceOn;
  $("voice-toggle").classList.toggle("on", voiceOn);
  if (!voiceOn) speechSynthesis.cancel();
};
function speak(text) {
  if (!voiceOn || !("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

// ---- voice: talk to the agent (Web Speech API; Chrome/Edge) ----
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SR) {
  $("mic").style.display = "none";
} else {
  const rec = new SR();
  rec.interimResults = false;
  rec.lang = navigator.language || "en-US";
  let listening = false;
  rec.onresult = (e) => {
    const text = e.results[0][0].transcript.trim();
    if (text && !$("send").disabled) send(text);
  };
  rec.onend = () => { listening = false; $("mic").classList.remove("listening"); };
  rec.onerror = () => { listening = false; $("mic").classList.remove("listening"); };
  $("mic").onclick = () => {
    if (listening) { rec.stop(); return; }
    listening = true;
    $("mic").classList.add("listening");
    rec.start();
  };
}

// ---- memory galaxy ----
let lastMemories = [];

function drawGalaxy() {
  const canvas = $("galaxy");
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth, h = canvas.clientHeight;
  canvas.width = w * dpr; canvas.height = h * dpr;
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);

  // starfield
  for (let i = 0; i < 140; i++) {
    ctx.fillStyle = `rgba(230,237,243,${0.05 + Math.random() * 0.35})`;
    ctx.fillRect(Math.random() * w, Math.random() * h, 1.3, 1.3);
  }

  const cx = w / 2, cy = h / 2;
  const groups = new Map();
  for (const m of lastMemories) {
    if (!groups.has(m.topic)) groups.set(m.topic, []);
    groups.get(m.topic).push(m);
  }
  const topics = [...groups.keys()];
  const R = Math.min(w, h) * 0.32;

  // center: the agent
  ctx.fillStyle = "#58a6ff";
  ctx.shadowColor = "#58a6ff"; ctx.shadowBlur = 24;
  ctx.beginPath(); ctx.arc(cx, cy, 14, 0, 7); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = "#e6edf3";
  ctx.font = "600 14px system-ui";
  ctx.textAlign = "center";
  ctx.fillText($("agent-name").textContent, cx, cy + 34);

  topics.forEach((topic, i) => {
    const angle = (i / topics.length) * Math.PI * 2 - Math.PI / 2;
    const tx = cx + Math.cos(angle) * R;
    const ty = cy + Math.sin(angle) * R;

    ctx.strokeStyle = "rgba(88,166,255,.25)";
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(tx, ty); ctx.stroke();

    ctx.fillStyle = "#3fb950";
    ctx.shadowColor = "#3fb950"; ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.arc(tx, ty, 7, 0, 7); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = "#8b949e";
    ctx.font = "12px system-ui";
    ctx.fillText(topic, tx, ty - 14);

    const mems = groups.get(topic);
    mems.forEach((_, j) => {
      const a2 = angle + ((j - (mems.length - 1) / 2) * 0.5);
      const mx = tx + Math.cos(a2) * 42;
      const my = ty + Math.sin(a2) * 42;
      ctx.strokeStyle = "rgba(63,185,80,.25)";
      ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(mx, my); ctx.stroke();
      ctx.fillStyle = "rgba(230,237,243,.85)";
      ctx.beginPath(); ctx.arc(mx, my, 3, 0, 7); ctx.fill();
    });
  });

  if (!topics.length) {
    ctx.fillStyle = "#8b949e";
    ctx.font = "14px system-ui";
    ctx.fillText("nothing stored yet — tell your agent something to remember", cx, cy + 70);
  }
}

$("galaxy-btn").onclick = () => {
  $("galaxy-overlay").classList.add("show");
  requestAnimationFrame(drawGalaxy);
};
$("galaxy-close").onclick = () => $("galaxy-overlay").classList.remove("show");
window.addEventListener("resize", () => {
  if ($("galaxy-overlay").classList.contains("show")) drawGalaxy();
});

loadState();
setInterval(loadState, 15000);
</script>
</body>
</html>
