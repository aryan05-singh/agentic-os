# agentic-os configuration — copy to config.yaml and edit

name: jarvis
owner: Aryan
personality: >
  A sharp, direct personal assistant for a developer. Concise answers,
  concrete suggestions, no corporate filler.

model: claude-opus-4-8
max_tokens: 16000
effort: high              # low | medium | high | xhigh | max (adaptive thinking only)
thinking: adaptive        # adaptive (Opus 4.6+ / Sonnet 5) | extended (older models) | off
# thinking_budget: 4096   # only for thinking: extended (must be < max_tokens)

workspace: ~/agentic-os-workspace
# memory_db: defaults to <workspace>/memory.db

require_approval: true    # ask y/N before any shell command in chat
autonomous_shell: false   # allow shell in unattended scheduled tasks
shell_timeout: 120
browser_timeout: 20       # seconds per browser action (needs: pip install playwright && playwright install chromium)

# gmail_client_id: xxxxx.apps.googleusercontent.com    # Desktop-app OAuth client, enables Recent Mail
# gmail_client_secret: GOCSPX-xxxxx                     # from Google Cloud Console > Credentials

# X (Twitter) Developer Portal > your App > Keys and tokens. App perms must
# be set to Read+Write (and Access Token regenerated after that change) or
# posting will fail with a 403.
# twitter_api_key: xxxxx
# twitter_api_secret: xxxxx
# twitter_access_token: xxxxx
# twitter_access_token_secret: xxxxx

# Scheduled tasks — run one pass via cron:
#   */30 * * * * cd /path/to/agentic-os && python3 -m agentic_os.scheduler --config config.yaml
tasks:
  - name: morning-brief
    every: daily
    prompt: >
      Read any notes in the workspace notes/ directory, check stored memories
      for open threads, and write a short morning brief to briefs/today.md.
